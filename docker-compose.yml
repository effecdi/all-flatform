services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: all_flatform
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d all_flatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    environment:
      DATABASE_URL: postgresql://appuser:${DB_PASSWORD:-changeme}@db:5432/all_flatform
      PORT: 5000
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATA_GO_KR_API_KEY: ${DATA_GO_KR_API_KEY:-}
      BIZINFO_API_KEY: ${BIZINFO_API_KEY:-}

volumes:
  pgdata:
